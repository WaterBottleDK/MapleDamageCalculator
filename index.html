<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maple Damage Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Maple Damage Calculator</h1>

    <div class="app-layout">

        <!-- ================= LEFT ================= -->

        <div class="left-column">

            <section class="panel">

                <h2>Character</h2>

                <label>Name</label>
                <input type="text" id="characterName">

                <label>Class</label>
                <select id="characterClass">
                    <option>Night Lord</option>
                </select>

                <label>Weapon</label>
                <select id="weapon">
                    <option>Claw</option>
                </select>

                <label>Skill</label>
                <select id="skill">
                    <option>Triple Throw</option>
                </select>

            </section>

            <section class="panel">

                <h2>Stats</h2>

                <div class="stat-row">
                    <label>STR</label>
                    <input type="number" id="baseStr" value="4">
                    <span id="itemStr">(+0)</span>
                </div>

                <div class="stat-row">
                    <label>DEX</label>
                    <input type="number" id="baseDex" value="4">
                    <span id="itemDex">(+0)</span>
                </div>

                <div class="stat-row">
                    <label>INT</label>
                    <input type="number" id="baseInt" value="4">
                    <span id="itemInt">(+0)</span>
                </div>

                <div class="stat-row">
                    <label>LUK</label>
                    <input type="number" id="baseLuk" value="4">
                    <span id="itemLuk">(+0)</span>
                </div>

                <div class="stat-row">
                    <label>WA</label>
                    <span id="totalWeaponAttack" class="wa-value">0</span>
                </div>

            </section>

        </div>

        <!-- ================= CENTER ================= -->

        <div class="center-column">

            <section class="panel">

                <h2>Equipment</h2>

                <div class="equipment-layout">

                    <button class="slot hat" data-slot="hat">
                        <span class="tick">✓</span>
                        Hat
                    </button>

                    <button class="slot face" data-slot="face">
                        <span class="tick">✓</span>
                        Face
                    </button>

                    <button class="slot star" data-slot="star">
                        <span class="tick">✓</span>
                        Star/Arrow
                    </button>

                    <button class="slot ring3" data-slot="ring3">
                        <span class="tick">✓</span>
                        Ring 3
                    </button>

                    <button class="slot ring4" data-slot="ring4">
                        <span class="tick">✓</span>
                        Ring 4
                    </button>

                    <button class="slot eye" data-slot="eye">
                        <span class="tick">✓</span>
                        Eye
                    </button>

                    <button class="slot earrings" data-slot="earrings">
                        <span class="tick">✓</span>
                        Earrings
                    </button>

                    <button class="slot cape" data-slot="cape">
                        <span class="tick">✓</span>
                        Cape
                    </button>

                    <button class="slot top" data-slot="top">
                        <span class="tick">✓</span>
                        Top
                    </button>

                    <button class="slot pendant" data-slot="pendant">
                        <span class="tick">✓</span>
                        Pendant
                    </button>

                    <button class="slot weapon-slot" data-slot="weapon">
                        <span class="tick">✓</span>
                        Weapon
                    </button>

                    <button class="slot shield" data-slot="shield">
                        <span class="tick">✓</span>
                        Shield
                    </button>

                    <button class="slot gloves" data-slot="gloves">
                        <span class="tick">✓</span>
                        Gloves
                    </button>

                    <button class="slot bottom" data-slot="bottom">
                        <span class="tick">✓</span>
                        Bottom
                    </button>

                    <button class="slot ring1" data-slot="ring1">
                        <span class="tick">✓</span>
                        Ring 1
                    </button>

                    <button class="slot ring2" data-slot="ring2">
                        <span class="tick">✓</span>
                        Ring 2
                    </button>

                    <button class="slot shoes" data-slot="shoes">
                        <span class="tick">✓</span>
                        Shoes
                    </button>

                </div>

            </section>

            <section class="panel">

                <h2>Damage</h2>

                <p>
                    <strong>Attack Range:</strong>
                    <span id="minDamage">0</span>
                    ~
                    <span id="maxDamage">0</span>
                </p>

                <p>
                    <strong>Average Skill Damage:</strong>
                    <span id="averageDamage">0</span>
                </p>

                <button onclick="calculateDamage()">
                    Calculate
                </button>

            </section>

        </div>

        <!-- ================= RIGHT ================= -->

        <div class="right-column">

            <section class="panel">

                <h2>Buffs</h2>

                <label>Attack Buff</label>
                <input type="number" id="attackBuff" value="0">

                <label>Attack Speed</label>

                <select id="attackSpeed">
                    <option value="600">Faster (2)</option>
                    <option value="660">Faster (3)</option>
                    <option value="720">Fast (4)</option>
                    <option value="750">Fast (5)</option>
                    <option value="810" selected>Normal (6)</option>
                </select>

                <label>Maple Warrior</label>

                <select id="mapleWarrior">
                    <option value="0">None</option>
                    <option value="5">Maple Warrior 10 (5%)</option>
                    <option value="10">Maple Warrior 20 (10%)</option>
                    <option value="13">Maple Warrior 30 (13%)</option>
                </select>

                <br><br>

                <label class="buff-label">

                    <input type="checkbox" id="sharpEyes">

                    <img src="images/3121002.png"
                        class="buff-icon"
                        alt="Sharp Eyes">

                </label>

            </section>

        </div>

    </div>

    <!-- ================= ITEM POPUP ================= -->

    <div id="itemModal" class="modal hidden">

        <div class="modal-content">

            <h2 id="modalTitle">Item</h2>

            <label>STR</label>
            <input type="number" id="itemEditStr" value="0">

            <label>DEX</label>
            <input type="number" id="itemEditDex" value="0">

            <label>INT</label>
            <input type="number" id="itemEditInt" value="0">

            <label>LUK</label>
            <input type="number" id="itemEditLuk" value="0">

            <label>Weapon Attack</label>
            <input type="number" id="itemEditWeaponAttack" value="0">

            <label>Magic Attack</label>
            <input type="number" id="itemEditMagicAttack" value="0">

            <br><br>

            <button onclick="saveItem()">Save</button>
            <button onclick="closeItemModal()">Cancel</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
